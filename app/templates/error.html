<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="stylesheet" href="/static/style.css">
<title>エラー｜オープンチェック</title>
<style>
  .errwrap{max-width:520px;margin:0 auto;padding:64px 22px;text-align:center}
  .errcode{font-size:12px;letter-spacing:.22em;color:var(--ink-dim);margin-bottom:16px}
  .erricon{font-size:54px;line-height:1;margin-bottom:14px}
  .errttl{font-size:22px;font-weight:800;margin:0 0 12px;color:var(--ink)}
  .errmsg{color:var(--ink-dim);line-height:1.95;margin:0 0 32px;font-size:15px}
  .err-home{display:block;background:var(--green-soft);color:#08160f;font-weight:800;
            padding:17px;border-radius:14px;text-decoration:none;font-size:17px}
  .err-back{display:inline-block;color:var(--ink-dim);text-decoration:none;font-size:14px;margin-top:18px;padding:8px}
</style>
</head>
<body>
<div class="errwrap">
  <div class="errcode">ERROR {{ code }}</div>
  <div class="erricon">⚠️</div>
  <h1 class="errttl">エラーが発生しました</h1>
  <p class="errmsg">
    {{ message }}<br>
    お手数ですが、トップページに戻ってやり直してください。
  </p>
  <a class="err-home" href="/">🏠 トップページに戻る</a>
  <a class="err-back" href="javascript:history.back()">← 前のページに戻る</a>
</div>
</body>
</html>
