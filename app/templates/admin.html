<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
<title>本部ダッシュボード｜オープンチェック</title>
<style>
  .adm-top{display:flex;align-items:baseline;justify-content:space-between;padding:8px 2px 16px}
  .adm-top h1{font-size:24px;margin:0}
  .adm-top .clock{color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;border-left:5px solid var(--line)}
  .card.unopened{border-left-color:var(--ember)}
  .card.unopened.overdue{border-left-color:var(--red);background:#2a1512}
  .card.open{border-left-color:var(--green)}
  .card.closed{border-left-color:var(--slate)}
  .card .nm{font-weight:800;font-size:17px;margin-bottom:6px}
  .pill{display:inline-block;font-size:12px;font-weight:800;padding:3px 9px;border-radius:999px;letter-spacing:.04em}
  .pill.unopened{background:#3a1c12;color:var(--ember-soft)}
  .pill.overdue{background:var(--red);color:#fff}
  .pill.open{background:#0f3a28;color:var(--green-soft)}
  .pill.closed{background:#22303b;color:#aac6da}
  .meta{margin-top:8px;font-size:13px;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .ph{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
  .ph a{width:46px;height:46px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .ho{margin-top:9px;font-size:13px;color:var(--ink);background:var(--panel-2);border-radius:8px;padding:8px;white-space:pre-wrap;line-height:1.5}
  .legend{color:var(--ink-dim);font-size:13px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="adm-top">
    <h1>店舗詳細一覧</h1>
    <div class="clock"><a href="/admin" style="color:var(--ember-soft);text-decoration:none;font-weight:700;margin-right:12px">← 🗾 マップに戻る</a><a href="/logout" style="color:var(--ink-dim);text-decoration:none;margin-right:12px">ログアウト</a><span id="date"></span>　更新 <span id="now"></span></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="legend">60秒ごとに自動更新／<span style="color:var(--red)">赤</span>＝開店時刻を過ぎても未オープン</div>
</div>

<script>
const STATE = { unopened:"未オープン", open:"営業中", closed:"閉店" };

async function load(){
  const r = await fetch("/api/admin/today");
  const d = await r.json();
  document.getElementById("date").textContent = d.date;
  document.getElementById("now").textContent = d.now;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for(const s of d.stores){
    const overdue = s.overdue;
    const cls = s.status + (overdue ? " overdue":"");
    const pillCls = overdue ? "overdue" : s.status;
    const pillTxt = overdue ? "未オープン！" : STATE[s.status];
    let meta = "開店予定 " + s.open_time;
    if(s.opened_at) meta = s.opened_at + " オープン";
    if(s.closed_at) meta = s.opened_at + "〜" + s.closed_at;
    const photos = (s.open_photos||[]).concat(s.close_photos||[]);
    const ph = photos.map(u=>`<a href="${u}" target="_blank"><img src="${u}"></a>`).join("");
    const ho = s.handover ? `<div class="ho">📋 ${escapeHtml(s.handover)}</div>` : "";
    const memo = s.memo ? `<div class="ho">📝 ${escapeHtml(s.memo)}</div>` : "";
    grid.insertAdjacentHTML("beforeend", `
      <div class="card ${cls}">
        <div class="nm">${escapeHtml(s.name)}</div>
        <span class="pill ${pillCls}">${pillTxt}</span>
        <div class="meta">${meta}</div>
        ${ph?`<div class="ph">${ph}</div>`:""}
        ${memo}${ho}
      </div>`);
  }
}
function escapeHtml(t){return (t||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
load();
setInterval(load, 60000);
</script>
</body>
</html>
